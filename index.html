<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Subnautica: Genome Expedition</title>
<style>
body{font-family:Arial; background:linear-gradient(#001018,#003a4f); color:white; text-align:center; padding:30px;}
button{padding:12px 18px; margin:8px; font-size:16px; background:#00bcd4; border:none; border-radius:8px; cursor:pointer;}
button:hover{background:#00e5ff;}
#hud{position:fixed; top:10px; left:10px; background:#000c; padding:15px; border-radius:10px; width:260px; text-align:left; font-size:14px;}
#oxygenBar{width:100%; height:14px; background:#333; border-radius:6px; overflow:hidden;}
#oxygenFill{height:100%; width:100%; background:#00e5ff; transition:0.3s;}
</style>
</head>
<body>
<h1>Subnautica: Genome Expedition</h1>

<div id="hud">
<b>Depth:</b> <span id="depth">0</span>m<br>
<b>Oxygen:</b>
<div id="oxygenBar"><div id="oxygenFill"></div></div>
<b>Biome:</b> <span id="biome">Safe Shallows</span><br>
<b>Signal:</b> <span id="signal">0</span>%<br>
<b>Inventory:</b><div id="inventory">None</div>
</div>

<div id="story"></div>
<div id="choices"></div>

<script>
/* GAME STATE */
let inventory=[]; let depth=0; let oxygen=100;
let maxDepthWithoutSuit=300; let maxDepthWithSuit=800; let maxDepthWithModule=1200;

/* HUD UPDATE */
function updateHUD(){
  document.getElementById("depth").innerText=depth;
  document.getElementById("oxygenFill").style.width=Math.min(oxygen,100)+"%";
  document.getElementById("signal").innerText=Math.min(Math.floor(depth/4),100);
  document.getElementById("inventory").innerHTML = inventory.length?inventory.join("<br>"):"None";
  updateBiome();
}
function updateBiome(){
  let b="Safe Shallows"; let bg="url('images/safe_shallows.png')";
  if(depth>100){ b="Kelp Forest"; bg="url('images/kelp_forest.png')"; }
  if(depth>250){ b="Crash Zone"; bg="url('images/crash_zone.png')"; }
  if(depth>500){ b="Deep Cave"; bg="url('images/deep_cave.png')"; }
  document.getElementById("biome").innerText=b;
  document.body.style.backgroundImage=bg;
  document.body.style.backgroundSize="cover";
}
function setScene(text,options){
  document.getElementById("story").innerHTML=text;
  let btns="";
  options.forEach(o=>btns+=`<button onclick="${o.action}">${o.text}</button>`);
  document.getElementById("choices").innerHTML=btns;
  updateHUD();
}

/* INVENTORY */
function addItem(item){
  if(!inventory.includes(item)) inventory.push(item);
  updateHUD();
  if(item==="Prawn Suit") document.getElementById("story").innerHTML+= '<p><img src="images/prawn_suit.png" width="300px" alt="Prawn Suit"></p>';
  if(item==="Genome Antidote") document.getElementById("story").innerHTML+= '<p><img src="images/genome.png" width="200px" alt="Genome Antidote"></p>';
  if(item==="Reinforced Suit") document.getElementById("story").innerHTML+= '<p><img src="images/reinforced_suit.png" width="300px" alt="Reinforced Suit"></p>';
}

/* START GAME */
function startGame(){
  inventory=[]; depth=0; oxygen=100;
  setScene(
    `<p>Five years ago, your father Simon vanished on Planet 4546-B.</p>
     <p>You are Max, his son, determined to find him.</p>
     <p>Your ship crashes into the alien ocean below.</p>`,
     [
       {text:"Search the Escape Pod",action:"searchEscapePod()"},
       {text:"Dive immediately",action:"firstDiveChoice()"}
     ]
  );
}

/* ESCAPE POD PATH */
function searchEscapePod(){
  setScene(
    `<p>You search the pod and find scattered items:</p>`,
    [
      {text:"Collect Metal Fragments", action:"collectMetal()"},
      {text:"Collect High-Capacity Tank", action:"collectTank()"},
      {text:"Skip gear and dive", action:"firstDiveChoice()"}
    ]
  );
}
function collectMetal(){ addItem("Metal Fragments"); firstDiveDepthPath(); }
function collectTank(){ addItem("High-Capacity Tank"); firstDiveShallowPath(); }

/* FIRST DIVE CHOICE (if skip) */
function firstDiveChoice(){
  if(inventory.includes("Metal Fragments")) firstDiveDepthPath();
  else if(inventory.includes("High-Capacity Tank")) firstDiveShallowPath();
  else setScene("<p>You dive into the water unprepared. You must pick some equipment.</p>",[{text:"Back to Escape Pod",action:"searchEscapePod()"}]);
}

/* DEPTH PATH - MUST COLLECT FIBER IN ROCKY OUTCROP */
function firstDiveDepthPath(){
  depth+=50; oxygen-=5;
  let options = [];
  if(!inventory.includes("Fiber")) options.push({text:"Explore Rocky Outcrop",action:"rockyOutcrop()"});
  if(inventory.includes("Reinforced Suit")) options.push({text:"Explore Kelp Forest",action:"goKelp()"});
  options.push({text:"Swim toward signal",action:"diveDeeperDepthPath()"});
  setScene(`<p>You plunge into the ocean (Depth Path).</p>`, options);
}

/* SHALLOW PATH */
function firstDiveShallowPath(){
  depth+=20; oxygen-=3;
  setScene(
    `<p>You dive near the shallow reefs (Shallow Path).</p>
     <img src="images/safe_shallows.png" width="400px" alt="Safe Shallows">`,
     [
       {text:"Explore shallow wreck",action:"shallowWreck()"},
       {text:"Swim toward signal",action:"diveDeeperShallowPath()"}
     ]
  );
}

/* ROCKY OUTCROP FOR FIBER (Depth Path) */
function rockyOutcrop(){
  depth+=30; oxygen-=5;
  setScene(
    `<p>You find Fiber tangled in algae around the rocks.</p>
     <img src="images/fiber.png" width="200px" alt="Fiber">`,
     [{text:"Collect Fiber",action:"collectFiber()"}]
  );
}
function collectFiber(){ addItem("Fiber"); craftReinforcedSuit(); }

/* CRAFTING */
function craftReinforcedSuit(){
  if(inventory.includes("Fiber") && inventory.includes("Metal Fragments")){
    addItem("Reinforced Suit");
    setScene("<p>You craft a Reinforced Suit! You can now explore the Kelp Forest safely.</p>",[{text:"Continue",action:"firstDiveDepthPath()"}]);
  } else {
    setScene("<p>You don't have enough materials to craft the suit yet.</p>",[{text:"Continue",action:"firstDiveDepthPath()"}]);
  }
}

/* KELP FOREST */
function goKelp(){
  depth+=120; oxygen-=10;
  if(depth>maxDepthWithoutSuit && !inventory.includes("Reinforced Suit")){ alert("Pressure is too high!"); return; }
  setScene(
    `<p>The Kelp Forest teems with alien life.</p>
     <img src="images/kelp_forest.png" width="400px" alt="Kelp Forest">`,
     [
       {text:"Collect Fiber",action:"rockyOutcrop()"},
       {text:"Continue toward signal",action:"diveDeeperDepthPath()"}
     ]
  );
}

/* DEEPER DIVES */
function diveDeeperDepthPath(){ depth+=150; oxygen-=15;
  if(depth>maxDepthWithoutSuit && !inventory.includes("Reinforced Suit")){ alert("Pressure too high!"); return; }
  randomEncounterDepth();
}
function diveDeeperShallowPath(){ depth+=30; oxygen-=7; randomEncounterShallow(); }

/* SHALLOW WRECK */
function shallowWreck(){ depth+=10; oxygen-=5;
  setScene(
    `<p>You find Simon's emergency signals nearby!</p>
     <img src="images/shallow_wreck.png" width="400px" alt="Shallow Wreck">`,
     [{text:"Investigate signal",action:"reunionShallow()"}]
  );
}

/* RANDOM ENCOUNTERS */
function randomEncounterDepth(){
  let r=Math.random();
  if(r<0.2){ setScene("<p>A shoal of glowing fish swims by.</p>",[{text:"Continue",action:"diveDeeperDepthPath()"}]); }
  else if(r<0.35){ setScene("<p>A stalker predator circles!</p>",[{text:"Evade",action:"diveDeeperDepthPath()"}]); }
  else if(r<0.45){ leviathanAttack(); }
  else findMaterialsDepth();
}
function randomEncounterShallow(){ setScene("<p>Small fish swim past the shallow reef.</p>",[{text:"Continue",action:"diveDeeperShallowPath()"}]); }

/* MATERIALS / PROGRESSION */
function findMaterialsDepth(){
  if(!inventory.includes("Fiber")) rockyOutcrop();
  else findSimon();
}

/* REUNION PATHS */
function findSimon(){ setScene("<p>You locate Simon's research base.</p>",[{text:"Enter base",action:"baseEntry()"}]);}
function reunionShallow(){ addItem("Simon"); escapeOptions();}

/* BASE ENTRY */
function baseEntry(){ addItem("Simon");
  setScene(
    `<p>Inside, you find clues about:</p>
     <ul><li>Genome Antidote</li><li>Ancient Alien Civilization</li></ul>`,
     [
       {text:"Collect Genome Antidote",action:"collectGenome()"},
       {text:"Collect Rocket Components",action:"collectRocketParts()"},
       {text:"Escape Planet",action:"escapePlanet()"}
     ]
  );
}
function collectGenome(){ addItem("Genome Antidote"); baseEntry(); }
function collectRocketParts(){ addItem("Rocket Components"); baseEntry(); }

/* ENDINGS */
function escapePlanet(){
  if(inventory.includes("Rocket Components") && inventory.includes("Genome Antidote") && inventory.includes("Simon")){
    setScene("<h2>Best Ending!</h2><p>You escape with Simon and the genome. Humanity will be saved!</p>",[]);
  } else if(inventory.includes("Rocket Components") && inventory.includes("Simon")){
    setScene("<h2>Second Best Ending</h2><p>You escape with Simon, but no genome. Planet remains unexplored.</p>",[]);
  } else{ setScene("<h2>Stranded!</h2><p>You cannot leave without rocket components! Forced to stay.</p>",[]);}
}

function leviathanAttack(){ setScene("<h2>Leviathan!</h2><p>A massive creature engulfs you.</p>",[{text:"Restart",action:"startGame()"}]);}

startGame();
</script>
</body>
</html>
