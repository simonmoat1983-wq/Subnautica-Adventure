<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Subnautica: Genome Expedition</title>
<style>
body{
  font-family:Arial;
  background:linear-gradient(#001018,#003a4f);
  color:white;
  text-align:center;
  padding:30px;
}
button{
  padding:12px 18px;
  margin:8px;
  font-size:16px;
  background:#00bcd4;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
button:hover{background:#00e5ff;}
#hud{
  position:fixed;
  top:10px;left:10px;
  background:#000c;padding:15px;border-radius:10px;
  width:250px;text-align:left;
  font-size:14px;
}
#oxygenBar{width:100%;height:14px;background:#333;border-radius:6px;overflow:hidden;}
#oxygenFill{height:100%;width:100%;background:#00e5ff;transition:0.3s;}
</style>
</head>
<body>
<h1>Subnautica: Genome Expedition</h1>

<div id="hud">
<b>Depth:</b> <span id="depth">0</span>m<br>
<b>Oxygen:</b>
<div id="oxygenBar"><div id="oxygenFill"></div></div>
<b>Biome:</b> <span id="biome">Safe Shallows</span><br>
<b>Signal:</b> <span id="signal">0</span>%<br>
<b>Inventory:</b><div id="inventory">None</div>
</div>

<div id="story"></div>
<div id="choices"></div>

<script>
/* GAME STATE */
let inventory=[];
let depth=0;
let oxygen=100;
let maxDepthWithoutSuit=300;
let maxDepthWithSuit=800;
let maxDepthWithModule=1200;

/* HELPER FUNCTIONS */
function updateHUD(){
  document.getElementById("depth").innerText=depth;
  document.getElementById("oxygenFill").style.width=oxygen+"%";
  document.getElementById("signal").innerText=Math.min(Math.floor(depth/4),100);
  document.getElementById("inventory").innerHTML = inventory.length?inventory.join("<br>"):"None";
  updateBiome();
}
function updateBiome(){
  let b="Safe Shallows";
  if(depth>100)b="Kelp Forest";
  if(depth>250)b="Crash Zone";
  if(depth>500)b="Deep Cave";
  if(depth>800)b="Old Wreck";
  if(depth>1100)b="Abyssal Trench";
  document.getElementById("biome").innerText=b;
}
function setScene(text,options){
  document.getElementById("story").innerHTML=text;
  let btns="";
  options.forEach(o=>btns+=`<button onclick="${o.action}">${o.text}</button>`);
  document.getElementById("choices").innerHTML=btns;
  updateHUD();
}
function addItem(item){
  if(!inventory.includes(item))inventory.push(item);
  updateHUD();
}

/* GAME START */
function startGame(){
  inventory=[]; depth=0; oxygen=100;
  setScene(
    `<p>Five years ago, your father Simon vanished on Planet 4546-B.</p>
     <p>You are Max, his son, determined to find him.</p>
     <p>A weak PDA signal reads: <b>"Max… follow the pulse…"</b></p>
     <p>Your ship crashes into the alien ocean below.</p>`,
     [
       {text:"Search the escape pod",action:"podSearch()"},
       {text:"Dive immediately",action:"firstDive()"}
     ]
  );
}

/* ESCAPE POD */
function podSearch(){
  setScene(
    `<p>You search the pod and find scattered materials:</p>`,
    [
      {text:"Take Repair Tool",action:"takeRepairTool()"},
      {text:"Take High-Capacity Tank",action:"takeTank()"},
      {text:"Skip gear and dive",action:"firstDive()"}
    ]
  );
}
function takeRepairTool(){ addItem("Repair Tool"); firstDive(); }
function takeTank(){ addItem("High O₂ Tank"); oxygen=150; firstDive(); }

/* FIRST DIVE */
function firstDive(){
  depth+=50; oxygen-=5;
  setScene(
    `<p>You plunge into the alien ocean.</p>
     <p>Two paths appear:</p>`,
    [
      {text:"Explore Kelp Forest",action:"goKelp()"},
      {text:"Swim toward the signal",action:"diveDeeper()"}
    ]
  );
}

/* KELP FOREST */
function goKelp(){
  depth+=120; oxygen-=10;
  setScene(
    `<p>The Kelp Forest teems with life.</p>
     <p>You spot glinting materials and strange creatures.</p>`,
    [
      {text:"Collect Fiber",action:"collectFiber()"},
      {text:"Continue deeper toward signal",action:"diveDeeper()"}
    ]
  );
}
function collectFiber(){ addItem("Fiber"); diveDeeper(); }

/* DEEP DIVE */
function diveDeeper(){
  depth+=150; oxygen-=15;
  if(depth>maxDepthWithoutSuit && !inventory.includes("Reinforced Suit")){
    alert("Pressure is too high! You need a Reinforced Suit.");
    return;
  }
  if(depth>maxDepthWithSuit && !inventory.includes("Depth Module")){
    alert("Even with Reinforced Suit, you need a Depth Module.");
    return;
  }
  if(oxygen<=0){ leviathanAttack(); return; }
  randomEncounter();
}

/* RANDOM ENCOUNTERS */
function randomEncounter(){
  let r=Math.random();
  if(r<0.2){
    setScene("<p>A shoal of glowing fish swims by.</p>",[{text:"Continue",action:"continueDive()"}]);
  } else if(r<0.35){
    setScene("<p>A stalker predator circles menacingly!</p>",[{text:"Evade",action:"continueDive()"}]);
  } else if(r<0.45){
    leviathanAttack();
  } else { continueDive(); }
}
function continueDive(){ setScene(
  "<p>The signal pulse grows stronger.</p>",
  [
    {text:"Descend further",action:"checkProgression()"},
    {text:"Return to surface",action:"surfaceReturn()"}
  ]
);}

/* PROGRESSION & MATERIALS */
function checkProgression(){
  if(depth>=400 && !inventory.includes("Reinforced Suit") && inventory.includes("Fiber") && inventory.includes("Metal Fragments")){
    craftReinforcedSuit();
    return;
  }
  if(depth>=400 && !inventory.includes("Prawn Suit")){
    setScene("<p>A ruined base contains a Prawn Suit.</p>",[{text:"Take Prawn Suit",action:"takePrawn()"}]);
    return;
  }
  if(depth>=800 && inventory.includes("Seamoth Access Pass")) findSimon();
  else diveDeeper();
}

function craftReinforcedSuit(){
  addItem("Reinforced Suit");
  maxDepthWithSuit=800;
  setScene("<p>You craft a Reinforced Suit! You can dive deeper now.</p>",[{text:"Continue",action:"diveDeeper()"}]);
}

function takePrawn(){ addItem("Prawn Suit"); maxDepthWithModule=1200; setScene("<p>Prawn Suit acquired!</p>",[{text:"Continue",action:"diveDeeper()"}]);}

/* FIND SIMON & SECRETS */
function findSimon(){
  setScene(
    "<p>You discover Simon's hidden research base.</p>",
    [{text:"Enter base",action:"baseEntry()"}]
  );
}
function baseEntry(){
  setScene(
    `<p>Inside, you find logs describing:</p>
     <ul>
       <li>Ancient alien civilization</li>
       <li>Genome antidote hidden in the abyss</li>
     </ul>`,
    [
      {text:"Search for Simon",action:"reunion()"},
      {text:"Explore logs & secrets",action:"exploreSecrets()"}
    ]
  );
}

function exploreSecrets(){
  setScene(
    "<p>You discover materials for a rocket and clues to the genome antidote.</p>",
    [
      {text:"Collect Rocket Materials",action:"collectRocketParts()"},
      {text:"Search for Genome Antidote",action:"collectGenome()"},
      {text:"Go to Simon",action:"reunion()"}
    ]
  );
}

function collectRocketParts(){ addItem("Rocket Components"); exploreSecrets(); }
function collectGenome(){ addItem("Genome Antidote"); exploreSecrets(); }

/* REUNION & ENDINGS */
function reunion(){
  addItem("Simon"); // father found
  setScene(
    "<p>You find Simon alive!</p>",
    [
      {text:"Escape Planet",action:"escapePlanet()"},
      {text:"Stay on Planet",action:"stayPlanet()"},
      {text:"Explore Alien Monolith",action:"mysticEnding()"}
    ]
  );
}

function escapePlanet(){
  if(inventory.includes("Rocket Components") && inventory.includes("Genome Antidote")){
    setScene("<h2>Best Ending!</h2><p>You launch the rocket, taking Simon and the genome. Humanity will be saved!</p>",[]);
  } else if(inventory.includes("Rocket Components")){
    setScene("<h2>Second Best Ending</h2><p>You escape with Simon, but no genome. Planet remains unexplored.</p>",[]);
  } else{
    setScene("<h2>Fail: Stranded</h2><p>You cannot leave without rocket parts! Forced to remain.</p>",[]);
  }
}

function stayPlanet(){
  setScene("<h2>Third Best Ending</h2><p>You and Simon build a deep-sea base and remain on Planet 4546-B.</p>",[]);
}

function mysticEnding(){
  setScene("<h2>Mystic Ending</h2><p>You merge with ancient alien consciousness in the monolith, exploring the ocean forever.</p>",[]);
}

function leviathanAttack(){
  setScene("<h2>Leviathan!</h2><p>A massive creature engulfs you.</p>",[{text:"Restart",action:"startGame()"}]);
}

function surfaceReturn(){ oxygen=100; setScene("<p>You return to surface and plan next dive.</p>",[{text:"Dive again",action:"firstDive()"}]);}

/* START GAME */
startGame();
</script>
</body>
</html>
