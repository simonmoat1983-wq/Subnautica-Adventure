```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Subnautica: The Lost Expedition</title>

<style>

body{
font-family:Arial;
background:linear-gradient(#001018,#003a4f);
color:white;
text-align:center;
padding:30px;
}

h1{
margin-bottom:10px;
}

button{
padding:12px 18px;
margin:10px;
font-size:16px;
background:#00bcd4;
border:none;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#00e5ff;
}

#hud{
position:fixed;
top:10px;
left:10px;
background:#000c;
padding:15px;
border-radius:10px;
width:220px;
text-align:left;
}

#oxygenBar{
width:100%;
height:14px;
background:#333;
border-radius:6px;
overflow:hidden;
margin-top:4px;
}

#oxygenFill{
height:100%;
width:100%;
background:#00e5ff;
transition:0.3s;
}

#creature img{
margin-top:20px;
max-width:300px;
}

</style>
</head>

<body>

<h1>Subnautica: The Lost Expedition</h1>

<div id="hud">

<div>
<b>Depth:</b> <span id="depth">0</span>m
</div>

<div style="margin-top:10px;">
<b>Oxygen</b>
<div id="oxygenBar">
<div id="oxygenFill"></div>
</div>
</div>

<div style="margin-top:10px;">
<b>Biome:</b> <span id="biome">Safe Shallows</span>
</div>

<div style="margin-top:10px;">
<b>Signal:</b> <span id="signal">0</span>%
</div>

<div style="margin-top:10px;">
<b>Inventory</b>
<div id="inventory">None</div>
</div>

</div>

<div id="story"></div>
<div id="choices"></div>

<div id="creature">
<img id="creatureImage">
</div>

<script>

/* GAME STATE */

let inventory=[]
let depth=0
let oxygen=100
let maxDepth=200

/* UI UPDATE */

function updateHUD(){

document.getElementById("depth").innerText=depth

document.getElementById("oxygenFill").style.width=oxygen+"%"

document.getElementById("inventory").innerHTML =
inventory.length?inventory.join("<br>"):"None"

document.getElementById("signal").innerText=
Math.min(Math.floor(depth/4),100)

updateBiome()

}

/* BIOMES */

function updateBiome(){

let biome="Safe Shallows"

if(depth>150) biome="Kelp Forest"
if(depth>300) biome="Crash Zone"
if(depth>600) biome="Grand Reef"
if(depth>900) biome="Lost River"
if(depth>1300) biome="Lava Zone"

document.getElementById("biome").innerText=biome

}

/* SCENE SYSTEM */

function setScene(text,options){

document.getElementById("story").innerHTML=text

let buttons=""

options.forEach(o=>{
buttons+=`<button onclick="${o.action}">${o.text}</button>`
})

document.getElementById("choices").innerHTML=buttons

updateHUD()

}

/* INVENTORY */

function addItem(item){

if(!inventory.includes(item)){
inventory.push(item)
}

updateHUD()

}

/* RANDOM CREATURES */

function randomEncounter(){

let r=Math.random()

let img=document.getElementById("creatureImage")

if(r<0.15){

img.src="images/peeper.png"

setScene(
"<p>A curious glowing fish watches you.</p>",
[{text:"Continue swimming",action:"continueDive()"}]
)

return
}

if(r<0.25){

img.src="images/stalker.png"

setScene(
"<p>A predator circles nearby.</p>",
[{text:"Swim away slowly",action:"continueDive()"}]
)

return
}

if(r<0.30){

img.src="images/leviathan.png"

badEnding()

return
}

continueDive()

}

/* GAME START */

function startGame(){

inventory=[]
depth=0
oxygen=100
maxDepth=200

setScene(

`<p>Five years ago your father disappeared.</p>

<p>His name was <b>Simon</b>.</p>

<p>A legendary explorer who vanished on an ocean planet.</p>

<p>You are <b>Max</b>.</p>

<p>Your ship arrives at Planet 4546-B searching for him.</p>

<p>Suddenly your ship breaks apart entering orbit.</p>

<p>You crash into an endless alien ocean.</p>

<p>Your PDA plays a weak message.</p>

<p><b>"Max… follow the signal."</b></p>

<p>It's your father's voice.</p>`,

[
{text:"Search the escape pod",action:"searchPod()"},
{text:"Dive into the ocean",action:"firstDive()"}
]

)

}

/* POD */

function searchPod(){

setScene(

"<p>You search the pod and find equipment.</p>",

[
{text:"Take Repair Tool",action:"takeRepairTool()"},
{text:"Take High Capacity Tank",action:"takeTank()"}
]

)

}

function takeRepairTool(){

addItem("Repair Tool")
firstDive()

}

function takeTank(){

addItem("High Capacity Tank")
oxygen=150
firstDive()

}

/* DIVING */

function firstDive(){

setScene(

"<p>You dive beneath the alien ocean following the signal.</p>",

[
{text:"Swim deeper",action:"dive()"}
]

)

}

function dive(){

depth+=50
oxygen-=10

if(depth>maxDepth){

alert("Crushing pressure! You need better equipment.")
depth=maxDepth

}

if(oxygen<=0){

badEnding()
return

}

randomEncounter()

updateHUD()

}

function continueDive(){

setScene(

"<p>The signal grows stronger below you.</p>",

[
{text:"Descend deeper",action:"checkDepth()"},
{text:"Return to surface",action:"surface()"}
]

)

}

/* PROGRESSION */

function checkDepth(){

if(depth<300){

dive()
return

}

if(!inventory.includes("Prawn Suit")){

setScene(

"<p>You discover a destroyed base containing a <b>Prawn Suit</b>.</p>",

[
{text:"Take the Prawn Suit",action:"getPrawn()"}
]

)

}

else{

findSimon()

}

}

function getPrawn(){

addItem("Prawn Suit")
maxDepth=900
findSimon()

}

/* STORY ENDING */

function findSimon(){

setScene(

`<p>You descend into a hidden cavern.</p>

<p>A research base glows in the darkness.</p>

<p>The door opens.</p>

<p>A man steps out.</p>

<p><b>"Max?"</b></p>

<p>It's your father.</p>`,

[
{text:"Escape the planet together",action:"escapeEnding()"},
{text:"Stay and survive here",action:"stayEnding()"}
]

)

}

function escapeEnding(){

if(inventory.includes("Repair Tool")){

setScene(

`<h2>True Ending</h2>

<p>You and Simon repair an alien launch platform.</p>

<p>A rocket rises from the ocean.</p>

<p>You both escape.</p>`,[]

)

}else{

setScene(

`<h2>Failed Escape</h2>

<p>You try to launch but lack the tools.</p>

<p>You remain stranded on the planet.</p>`,[]

)

}

}

function stayEnding(){

setScene(

`<h2>Survivor Ending</h2>

<p>You and Simon build a base beneath the waves.</p>

<p>Together you explore the alien oceans forever.</p>`,[]

)

}

/* SURFACE */

function surface(){

oxygen=100

setScene(

"<p>You return to the surface to recover.</p>",

[
{text:"Dive again",action:"dive()"}
]

)

}

/* BAD ENDING */

function badEnding(){

setScene(

`<h2>Leviathan Ending</h2>

<p>A massive shadow rises beneath you.</p>

<p>The ocean goes silent.</p>`,

[
{text:"Restart",action:"startGame()"}
]

)

}

/* START */

startGame()

</script>

</body>
</html>
```
