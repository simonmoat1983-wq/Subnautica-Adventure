```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Subnautica: The Lost Expedition</title>

<style>

body{
font-family:Arial;
background:linear-gradient(#001018,#00384a);
color:white;
text-align:center;
padding:40px;
}

button{
padding:12px;
margin:10px;
font-size:16px;
background:#00bcd4;
border:none;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#00e5ff;
}

#hud{
position:fixed;
top:10px;
right:10px;
background:#000a;
padding:15px;
border-radius:10px;
text-align:left;
}

#creature{
margin-top:20px;
}

</style>

</head>

<body>

<h1>Subnautica: The Lost Expedition</h1>

<div id="hud">
<b>Inventory</b>
<div id="inventory">None</div>
<br>
Depth: <span id="depth">0</span>m
<br>
Oxygen: <span id="oxygen">100</span>
</div>

<div id="story"></div>
<div id="choices"></div>

<div id="creature">
<img id="creatureImage" width="300">
</div>

<script>

let inventory=[]
let depth=0
let oxygen=100
let maxDepth=200

function updateHUD(){

document.getElementById("inventory").innerHTML=
inventory.length?inventory.join("<br>"):"None"

document.getElementById("depth").innerText=depth
document.getElementById("oxygen").innerText=oxygen

}

function setScene(text,options){

document.getElementById("story").innerHTML=text

let buttons=""

options.forEach(option=>{
buttons+=`<button onclick="${option.action}">${option.text}</button>`
})

document.getElementById("choices").innerHTML=buttons

updateHUD()

}

function addItem(item){

if(!inventory.includes(item)) inventory.push(item)

updateHUD()

}

function playSound(file){

let audio=new Audio("sounds/"+file+".mp3")
audio.play()

}

function randomEncounter(){

let roll=Math.random()

if(roll<0.2){

document.getElementById("creatureImage").src="images/peeper.png"

setScene(

"<p>A glowing alien fish swims past curiously.</p>",

[{text:"Continue swimming",action:"continueDive()"}]

)

}

else if(roll<0.35){

document.getElementById("creatureImage").src="images/stalker.png"

setScene(

"<p>A predator circles you in the water.</p>",

[{text:"Swim away carefully",action:"continueDive()"}]

)

}

else if(roll<0.40){

document.getElementById("creatureImage").src="images/leviathan.png"

playSound("roar")

badEnding()

}

else{

continueDive()

}

}

function startGame(){

setScene(

`<p>Five years ago your father disappeared.</p>

<p>His name was <b>Simon</b>, a legendary ocean explorer.</p>

<p>His last signal came from Planet 4546-B.</p>

<p>You are <b>Max</b>.</p>

<p>Today you finally arrive searching for him.</p>

<p>Your ship breaks apart entering orbit.</p>

<p>You crash into an endless alien ocean.</p>

<p>Your PDA suddenly plays a message.</p>

<p><b>"Max… if you're hearing this… follow the signal."</b></p>

<p>It's your father's voice.</p>`,

[
{text:"Search the escape pod",action:"searchPod()"},
{text:"Dive into the ocean",action:"firstDive()"}
]

)

}

function searchPod(){

setScene(

"<p>You search the pod and find useful equipment.</p>",

[
{text:"Take Repair Tool",action:"takeRepairTool()"},
{text:"Take High Capacity Tank",action:"takeTank()"}
]

)

}

function takeRepairTool(){

addItem("Repair Tool")
firstDive()

}

function takeTank(){

addItem("High Capacity Tank")
oxygen=150
firstDive()

}

function firstDive(){

setScene(

"<p>You dive into the alien ocean following your father's signal.</p>",

[
{text:"Swim deeper",action:"dive()"}
]

)

}

function dive(){

depth+=50
oxygen-=10

if(depth>maxDepth){

alert("Crushing pressure! You need better equipment.")
depth=maxDepth

}

if(oxygen<=0){

badEnding()
return

}

randomEncounter()

updateHUD()

}

function continueDive(){

setScene(

"<p>The signal grows stronger below you.</p>",

[
{text:"Descend deeper",action:"checkDepth()"},
{text:"Return to surface",action:"surface()"}
]

)

}

function checkDepth(){

if(depth<300){

dive()

return

}

if(!inventory.includes("Prawn Suit")){

setScene(

"<p>You discover a destroyed base containing a <b>Prawn Suit</b>.</p>",

[
{text:"Take the Prawn Suit",action:"getPrawn()"}
]

)

}

else{

findSimon()

}

}

function getPrawn(){

addItem("Prawn Suit")
maxDepth=900
findSimon()

}

function findSimon(){

setScene(

`<p>You descend into a massive underwater cavern.</p>

<p>A research base appears in the darkness.</p>

<p>The door opens.</p>

<p>A man steps out.</p>

<p><b>"Max?"</b></p>

<p>It's your father.</p>`,

[
{text:"Attempt to escape the planet together",action:"escapeEnding()"},
{text:"Stay and survive together",action:"stayEnding()"}
]

)

}

function escapeEnding(){

if(inventory.includes("Repair Tool")){

setScene(

`<h2>True Ending</h2>

<p>You and Simon repair an ancient launch platform.</p>

<p>A rocket rises from the alien ocean.</p>

<p>You both escape the planet together.</p>`,[]

)

}else{

setScene(

`<h2>Failed Escape</h2>

<p>Without the right tools the rocket cannot launch.</p>

<p>You and Simon remain stranded on the ocean world.</p>`,[]

)

}

}

function stayEnding(){

setScene(

`<h2>Survivor Ending</h2>

<p>You and Simon build a permanent base beneath the waves.</p>

<p>Together you explore the alien oceans forever.</p>`,[]

)

}

function surface(){

setScene(

"<p>You return to the surface to plan your next dive.</p>",

[
{text:"Dive again",action:"dive()"}
]

)

}

function badEnding(){

setScene(

`<h2>Leviathan Ending</h2>

<p>A massive shadow rises from the depths.</p>

<p>The last thing you hear is a roar.</p>`,

[
{text:"Restart",action:"startGame()"}
]

)

}

startGame()

</script>

</body>
</html>
```
