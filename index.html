<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Subnautica: Genome Expedition</title>

<style>

body{
font-family:Arial;
color:white;
text-align:center;
margin:0;
overflow:hidden;
background:linear-gradient(#00131a,#002b3a);
}

/* animated water */
body::before{
content:"";
position:fixed;
top:0;
left:0;
width:200%;
height:200%;
background:
radial-gradient(circle at 20% 30%, rgba(0,200,255,0.15), transparent 40%),
radial-gradient(circle at 70% 60%, rgba(0,150,255,0.2), transparent 40%),
radial-gradient(circle at 50% 80%, rgba(0,255,255,0.1), transparent 40%);
animation:waterMove 20s linear infinite;
}

@keyframes waterMove{
0%{transform:translate(0,0)}
50%{transform:translate(-10%, -5%)}
100%{transform:translate(0,0)}
}

#game{
position:relative;
z-index:2;
padding:30px;
}

button{
padding:12px 18px;
margin:8px;
font-size:16px;
background:#00bcd4;
border:none;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#00e5ff;
}

#hud{
position:fixed;
top:10px;
left:10px;
background:#000c;
padding:15px;
border-radius:10px;
width:260px;
text-align:left;
font-size:14px;
z-index:3;
}

#oxygenBar{
width:100%;
height:14px;
background:#333;
border-radius:6px;
overflow:hidden;
}

#oxygenFill{
height:100%;
width:100%;
background:#00e5ff;
transition:0.3s;
}

</style>
</head>

<body>

<div id="hud">
<b>Depth:</b> <span id="depth">0</span>m<br>

<b>Oxygen:</b>
<div id="oxygenBar"><div id="oxygenFill"></div></div>

<b>Biome:</b> <span id="biome">Safe Shallows</span><br>

<b>Signal:</b> <span id="signal">0</span>%<br>

<b>Inventory</b>
<div id="inventory">None</div>
</div>

<div id="game">

<h1>Subnautica: Genome Expedition</h1>

<div id="story"></div>
<div id="choices"></div>

</div>

<script>

/* GAME STATE */

let inventory=[]
let depth=0
let oxygen=100
let maxOxygen=100

let signal=0

/* HUD */

function updateHUD(){

document.getElementById("depth").innerText=depth
document.getElementById("oxygenFill").style.width=(oxygen/maxOxygen*100)+"%"
document.getElementById("signal").innerText=signal

document.getElementById("inventory").innerHTML =
inventory.length?inventory.join("<br>"):"None"

updateBiome()

}

/* BIOMES */

function updateBiome(){

let biome="Safe Shallows"

if(depth>100) biome="Kelp Forest 🌿"
if(depth>300) biome="Grassy Plateaus 🪸"
if(depth>600) biome="Deep Caves 🦑"
if(depth>900) biome="Alien Facility 👽"

document.getElementById("biome").innerText=biome

}

/* SCENE SYSTEM */

function setScene(text,options){

document.getElementById("story").innerHTML=text

let buttons=""

options.forEach(o=>{
buttons+=`<button onclick="${o.action}">${o.text}</button>`
})

document.getElementById("choices").innerHTML=buttons

updateHUD()

}

/* INVENTORY */

function addItem(item){

if(!inventory.includes(item))
inventory.push(item)

updateHUD()

}

/* OXYGEN */

function checkOxygen(){

if(oxygen<=0){

setScene(
"<h2>You ran out of oxygen 💀</h2>",
[{text:"Restart",action:"startGame()"}]
)

}

}

/* START */

function startGame(){

inventory=[]
depth=0
oxygen=100
maxOxygen=100
signal=0

setScene(

`<p>Your ship crashes into the ocean of planet 4546-B.</p>

<p>You are searching for your father Simon's lost research.</p>

<p>A mysterious signal pulses from the deep.</p>`,

[
{text:"Search Escape Pod",action:"searchPod()"},
{text:"Dive into ocean",action:"dive()"}
]

)

}

/* POD */

function searchPod(){

addItem("Scanner")

setScene(

"<p>You find a scanner tool 🔎</p>",

[
{text:"Dive",action:"dive()"}
]

)

}

/* MAIN LOOP */

function dive(){

depth+=Math.floor(Math.random()*80)+40
oxygen-=10
signal=Math.min(signal+10,100)

checkOxygen()

randomEvent()

}

/* RANDOM EVENTS */

function randomEvent(){

let r=Math.random()

if(r<0.25) fishEvent()
else if(r<0.45) materialEvent()
else if(r<0.60) wreckEvent()
else if(r<0.75) craftEvent()
else if(r<0.90) nothingEvent()
else leviathan()

}

/* EVENTS */

function fishEvent(){

setScene(

"<p>A glowing alien fish swims past 🐟</p>",

[
{text:"Scan creature",action:"scanFish()"},
{text:"Continue diving",action:"dive()"}
]

)

}

function scanFish(){

addItem("Creature Scan")

setScene(

"<p>Scan complete! Alien DNA recorded.</p>",

[
{text:"Continue diving",action:"dive()"}
]

)

}

/* MATERIALS */

function materialEvent(){

let materials=["Titanium","Fiber","Quartz"]

let m=materials[Math.floor(Math.random()*materials.length)]

setScene(

`<p>You discover ${m} deposits.</p>`,

[
{text:`Collect ${m}`,action:`collectMaterial('${m}')`},
{text:"Ignore and dive",action:"dive()"}
]

)

}

function collectMaterial(m){

addItem(m)

setScene(

`<p>${m} added to inventory.</p>`,

[
{text:"Continue diving",action:"dive()"}
]

)

}

/* WRECK */

function wreckEvent(){

setScene(

"<p>You find a wrecked research pod.</p>",

[
{text:"Search wreck",action:"searchWreck()"},
{text:"Leave",action:"dive()"}
]

)

}

function searchWreck(){

addItem("Data Log")

signal+=20

setScene(

"<p>You recover research logs from Simon!</p>",

[
{text:"Follow signal deeper",action:"dive()"}
]

)

}

/* CRAFT */

function craftEvent(){

if(inventory.includes("Titanium") && inventory.includes("Fiber") && !inventory.includes("Reinforced Suit")){

setScene(

"<p>You can craft a Reinforced Suit.</p>",

[
{text:"Craft Suit",action:"craftSuit()"},
{text:"Keep diving",action:"dive()"}
]

)

return

}

nothingEvent()

}

function craftSuit(){

addItem("Reinforced Suit")

maxOxygen=140

setScene(

"<p>Reinforced Suit crafted! Oxygen capacity increased.</p>",

[
{text:"Dive deeper",action:"dive()"}
]

)

}

/* NOTHING */

function nothingEvent(){

setScene(

"<p>The ocean is quiet...</p>",

[
{text:"Continue diving",action:"dive()"}
]

)

}

/* LEVIATHAN */

function leviathan(){

setScene(

"<h2>Leviathan attack! 🐉</h2>",

[
{text:"Evade",action:"evade()"},
{text:"Panic",action:"panic()"}
]

)

}

function evade(){

if(Math.random()<0.5){

setScene(

"<p>You escaped!</p>",

[
{text:"Swim deeper",action:"dive()"}
]

)

}

else{

setScene(

"<p>The creature catches you...</p>",

[
{text:"Restart",action:"startGame()"}
]

)

}

}

function panic(){

setScene(

"<p>You panic and run out of oxygen.</p>",

[
{text:"Restart",action:"startGame()"}
]

)

}

/* START GAME */

startGame()

</script>

</body>
</html>
